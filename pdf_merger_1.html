<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #47c9ff;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4747;
    --success: #47ff8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 20px;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: #1e1e1a;
  }

  .drop-zone.dragover { transform: scale(1.01); }

  .drop-icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: block;
    opacity: 0.5;
  }

  .drop-text {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .drop-text strong { color: var(--text); }

  .drop-hint {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  #fileInput { display: none; }

  /* File List */
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .file-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: grab;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .file-item:hover { border-color: #444; background: var(--surface2); }
  .file-item.dragging { opacity: 0.4; }
  .file-item.drag-over { border-color: var(--accent); background: #1e1e1a; }

  .file-icon {
    width: 32px; height: 32px;
    background: #ff3b30;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: white;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }

  .drag-handle {
    color: var(--muted);
    font-size: 16px;
    cursor: grab;
    flex-shrink: 0;
  }

  .btn-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-remove:hover { color: var(--danger); background: #ff474715; }

  /* Order hint */
  .order-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    font-family: 'IBM Plex Mono', monospace;
    display: none;
  }

  .order-hint.show { display: block; }

  /* Output name */
  .output-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
  }

  .output-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }

  .output-input {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    outline: none;
    transition: border-color 0.15s;
  }

  .output-input:focus { border-color: var(--accent); }

  /* Merge Button */
  .btn-merge {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0f0f0f;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-merge:hover { background: #d4e840; transform: translateY(-1px); }
  .btn-merge:active { transform: translateY(0); }
  .btn-merge:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  .progress-wrap {
    margin-top: 16px;
    display: none;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
  }

  /* Status */
  .status {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
    text-align: center;
  }

  .status.success {
    display: block;
    background: #47ff8a18;
    border: 0.5px solid var(--success);
    color: var(--success);
  }

  .status.error {
    display: block;
    background: #ff474718;
    border: 0.5px solid var(--danger);
    color: var(--danger);
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
  }

  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 16px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PDF Tools</div>
  <h1>รวม<span>PDF</span></h1>
  <p class="subtitle">ลากไฟล์มาวาง · จัดลำดับ · รวมเป็นไฟล์เดียว</p>
</header>

<div class="container">

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">⬆</span>
    <p class="drop-text"><strong>คลิกเพื่อเลือกไฟล์</strong> หรือลากมาวางที่นี่</p>
    <p class="drop-hint">รองรับเฉพาะ .pdf · เพิ่มได้หลายไฟล์พร้อมกัน</p>
    <input type="file" id="fileInput" multiple accept=".pdf">
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat-card">
      <div class="stat-val" id="statCount">0</div>
      <div class="stat-label">ไฟล์</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statSize">0 MB</div>
      <div class="stat-label">ขนาดรวม</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statPages">—</div>
      <div class="stat-label">หน้ารวม (โดยประมาณ)</div>
    </div>
  </div>

  <!-- Order hint -->
  <div class="order-hint" id="orderHint">⠿ ลากไฟล์เพื่อเปลี่ยนลำดับ</div>

  <!-- File List -->
  <div class="file-list" id="fileList"></div>

  <!-- Output name -->
  <div class="output-row" id="outputRow" style="display:none">
    <span class="output-label">ชื่อไฟล์ผลลัพธ์:</span>
    <input class="output-input" type="text" id="outputName" value="merged.pdf">
  </div>

  <!-- Merge Button -->
  <button class="btn-merge" id="mergeBtn" disabled>
    <span>รวม PDF</span>
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">กำลังประมวลผล...</div>
  </div>

  <!-- Status -->
  <div class="status" id="status"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileList   = document.getElementById('fileList');
const mergeBtn   = document.getElementById('mergeBtn');
const outputName = document.getElementById('outputName');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const statusEl   = document.getElementById('status');
const statsEl    = document.getElementById('stats');
const outputRow  = document.getElementById('outputRow');
const orderHint  = document.getElementById('orderHint');

let files = [];
let dragSrcIndex = null;

// Drop zone events
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (f.type === 'application/pdf' && !files.find(x => x.name === f.name && x.size === f.size)) {
      files.push(f);
    }
  });
  render();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function render() {
  fileList.innerHTML = '';
  statusEl.className = 'status';
  statusEl.style.display = 'none';

  const hasFiles = files.length > 0;
  statsEl.style.display = hasFiles ? 'flex' : 'none';
  outputRow.style.display = hasFiles ? 'flex' : 'none';
  orderHint.className = 'order-hint' + (files.length > 1 ? ' show' : '');
  mergeBtn.disabled = files.length < 2;

  // Stats
  const totalSize = files.reduce((s, f) => s + f.size, 0);
  document.getElementById('statCount').textContent = files.length;
  document.getElementById('statSize').textContent = formatSize(totalSize);
  document.getElementById('statPages').textContent = '~' + (files.length * 3);

  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.draggable = true;
    item.innerHTML = `
      <div class="drag-handle">⠿</div>
      <div class="file-icon">PDF</div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-size">${formatSize(f.size)}</div>
      </div>
      <button class="btn-remove" title="ลบ">×</button>
    `;

    item.querySelector('.btn-remove').addEventListener('click', () => {
      files.splice(i, 1);
      render();
    });

    // Drag to reorder
    item.addEventListener('dragstart', () => { dragSrcIndex = i; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      if (dragSrcIndex !== null && dragSrcIndex !== i) {
        const moved = files.splice(dragSrcIndex, 1)[0];
        files.splice(i, 0, moved);
        render();
      }
    });

    fileList.appendChild(item);
  });
}

// Merge
mergeBtn.addEventListener('click', async () => {
  if (files.length < 2) return;

  mergeBtn.disabled = true;
  progressWrap.classList.add('show');
  statusEl.className = 'status';
  statusEl.style.display = 'none';

  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();

    for (let i = 0; i < files.length; i++) {
      const pct = Math.round((i / files.length) * 90);
      progressBar.style.width = pct + '%';
      progressText.textContent = `กำลังรวม: ${files[i].name} (${i + 1}/${files.length})`;

      const buf  = await files[i].arrayBuffer();
      const doc  = await PDFDocument.load(buf, { ignoreEncryption: true });
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }

    progressBar.style.width = '95%';
    progressText.textContent = 'กำลังสร้างไฟล์...';

    const bytes = await merged.save();
    const blob  = new Blob([bytes], { type: 'application/pdf' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href = url;
    a.download = outputName.value.endsWith('.pdf') ? outputName.value : outputName.value + '.pdf';
    a.click();
    URL.revokeObjectURL(url);

    progressBar.style.width = '100%';
    progressText.textContent = 'สำเร็จ!';

    statusEl.className = 'status success';
    statusEl.textContent = `รวม ${files.length} ไฟล์สำเร็จ → ดาวน์โหลด "${a.download}" แล้ว`;
    statusEl.style.display = 'block';

  } catch (err) {
    statusEl.className = 'status error';
    statusEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    statusEl.style.display = 'block';
  } finally {
    setTimeout(() => { progressWrap.classList.remove('show'); progressBar.style.width = '0%'; }, 2000);
    mergeBtn.disabled = false;
  }
});
</script>
</body>
</html>
